---
- name: Configurer la base de donnees
  hosts: db
  become: true
  roles:
    - common
    - postgresql
    - role: firewall
      firewall_allowed:
        - { port: "5432", src: "{{ hostvars['wiki-web'].ansible_host }}" }

- name: Configurer le serveur web
  hosts: web
  become: true
  roles:
    - common
    - wikijs
    - nginx
    - role: firewall
      firewall_allowed:
        - { port: "80" }
