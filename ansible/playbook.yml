---
- name: Configurer la base de donnees
  # Le serveur PostgreSQL est durci avant le serveur web pour éviter les dépendances croisées au démarrage.
  hosts: db
  become: true
  roles:
    - common
    - postgresql
    - role: firewall
      firewall_allowed:
        - { port: "5432", src: "{{ hostvars['wiki-web'].ansible_host }}" }

- name: Configurer le serveur web
  # Le front expose Wiki.js uniquement via Nginx et récupère la base distante via la config du rôle.
  hosts: web
  become: true
  roles:
    - common
    - wikijs
    - nginx
    - role: firewall
      firewall_allowed:
        - { port: "80" }
