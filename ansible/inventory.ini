[web]
# Inventaire statique de référence, utile pour tester Ansible sans régénération Terraform.
wiki-web ansible_host=10.0.1.16

[db]
# La base est séparée du front pour appliquer des règles réseau plus strictes.
wiki-db ansible_host=10.0.1.17

[all:vars]
# Même identité de connexion que dans l'inventaire généré par Terraform.
ansible_user=devops
ansible_ssh_private_key_file=~/.ssh/wiki_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=root@82.64.141.52:4007'
